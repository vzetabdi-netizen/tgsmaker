services:
  - type: worker
    name: svg-tgs-bot
    env: python
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python enhanced_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false        # Render dashboard → Environment
      - key: DATABASE_URL
        sync: false        # Your MongoDB Atlas connection string
      - key: OWNER_ID
        sync: false        # Your Telegram user ID
      - key: MONGO_DB_NAME
        value: svg_tgs_bot # MongoDB database name (can leave as-is)
