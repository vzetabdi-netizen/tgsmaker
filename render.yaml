services:
  - type: web
    name: svg-tgs-bot
    env: python
    plan: starter
    pythonVersion: "3.11.10"
    buildCommand: >
      pip install --upgrade pip &&
      pip install -r requirements.txt
    startCommand: python enhanced_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OWNER_ID
        sync: false
      - key: MONGO_DB_NAME
        value: svg_tgs_bot
