services:
  - type: worker
    name: svg-tgs-bot
    env: python
    plan: starter
    pythonVersion: "3.11.10"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python enhanced_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: svg-tgs-db
          property: connectionString
      - key: OWNER_ID
        sync: false

databases:
  - name: svg-tgs-db
    plan: starter
    databaseName: svg_tgs_bot
    user: bot_user
