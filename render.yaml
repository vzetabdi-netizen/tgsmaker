services:
  - type: worker
    name: svg-tgs-bot
    env: python
    plan: starter          # cheapest paid plan — free tier sleeps after 15 min
    buildCommand: pip install -r requirements.txt
    startCommand: python enhanced_bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false        # set manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: svg-tgs-db
          property: connectionString
      - key: OWNER_ID
        sync: false        # your Telegram user ID

databases:
  - name: svg-tgs-db
    plan: starter          # free PostgreSQL tier on Render
    databaseName: svg_tgs_bot
    user: bot_user
